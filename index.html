<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JJ Shaw</title>
    <meta name="description" content="JJ Shaw's personal site." />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet" />
</head>
<body>
    <main class="desk" aria-label="JJ Shaw tabletop desk">
        <section class="intro-note" aria-label="Site note">
            <p class="scribble">JJ Shaw</p>
            <div class="intro-actions">
                <a href="mailto:hello@shawjj.com">hello@shawjj.com</a>
                <button class="about-toggle" type="button" aria-expanded="false" aria-controls="about-panel">About Me</button>
            </div>
        </section>

        <div class="about-backdrop" hidden></div>
        <section class="about-panel" id="about-panel" aria-label="About JJ Shaw" hidden>
            <p>
                Investment Banking Associate at Deutsche Bank, advising consumer and technology companies on strategic financing solutions. IG debt offerings / capital structure advisory. Columbia University, Class of 2022.
            </p>
        </section>

        <div class="desk-sticker sticker-dot dot-cobalt" aria-hidden="true"></div>
        <div class="desk-sticker sticker-dot dot-cream" aria-hidden="true"></div>
        <div class="desk-sticker sticker-star" aria-hidden="true"></div>

        <article class="image-sticker business-card-sticker draggable" aria-label="Draggable business card sticker" data-draggable data-rotation="-5" data-drag-rotation="-2">
            <img src="images/business-card.jpeg" alt="JJ Shaw business card" draggable="false" />
            <span class="drag-cue">drag me</span>
        </article>

        <article class="image-sticker keyboard-sticker draggable" aria-label="Draggable Bloomberg keyboard sticker" data-draggable data-rotation="4" data-drag-rotation="1">
            <img src="images/bloomberg-keyboard.jpeg" alt="Old-school Bloomberg keyboard" draggable="false" />
        </article>

        <article class="image-sticker pennant-sticker draggable" aria-label="Draggable Columbia University pennant sticker" data-draggable data-rotation="-8" data-drag-rotation="-4">
            <img src="images/columbia-pennant.png" alt="Columbia University pennant" draggable="false" />
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
